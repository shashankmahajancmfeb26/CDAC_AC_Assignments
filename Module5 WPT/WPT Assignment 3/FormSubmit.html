<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="FormSubmit.css">
</head>
<body>
<div id="container">
    <h3>Input Form</h3>
    <form>
        <input type="text" id="fname" placeholder="First Name"><br><br>
        <input type="text" id="lname" placeholder="Last Name"><br><br>
        <input type="tel" id="contactno" placeholder="Contact No."><br><br>
        <input type="email" id="email" placeholder="Email ID"><br><br>
        <button type="button" onclick="display()">Submit</button>
    </form>
</div>
    <h2>Form Output</h2>
    <div id="displayArea"></div>

    <script>
        function display() {
            const fName = document.getElementById('fname').value;
            const lName = document.getElementById('lname').value;
            const phone = document.getElementById('contactno').value;
            const email = document.getElementById('email').value;

            const output = `
                <p><strong>First Name:</strong> ${fName}</p>
                <p><strong>Last Name:</strong> ${lName}</p>
                <p><strong>Contact:</strong> ${phone}</p>
                <p><strong>Email:</strong> ${email}</p>
            `;
            
            document.getElementById('displayArea').innerHTML = output;
        }
    </script>

</body>
</html>
