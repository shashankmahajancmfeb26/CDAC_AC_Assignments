<html>
<head>
    <link rel="stylesheet" type="text/css" href="RegistrationForm.css">
</head>
<div id="heading">
    <p align="center"><u>STUDENT REGISTRATION FORM</u></p>
</div>

<form>
<div id="container">

    <label class="main-label">FIRST NAME : </label><input type="text"><br><br>
    <label class="main-label">LAST NAME : </label><input type="text"><br><br>
    <label class="main-label">DATE OF BIRTH : </label><input type="date"><br><br>
    <label class="main-label">EMAIL ID : </label><input type="email"><br><br>
    <label class="main-label">MOBILE : </label><input type="number"><br><br>

    <label class="main-label">GENDER : </label>
    <input type="radio" name="GENDER"> Male
    <input type="radio" name="GENDER"> Female<br><br>

    <label class="main-label">ADDRESS : </label><textarea></textarea><br><br>
    <label class="main-label">CITY : </label><input type="text"><br><br>
    <label class="main-label">PIN CODE : </label><input type="number"><br><br>
    <label class="main-label">STATE : </label><input type="text"><br><br>
    <label class="main-label">COUNTRY : </label><input type="text"><br><br>

    <label class="main-label">HOBBIES : </label><br><br>
    <input type="checkbox"> Drawing
    <input type="checkbox"> Singing
    <input type="checkbox"> Dancing
    <input type="checkbox"> Sketching
    <input type="checkbox"> Others
    <input type="text" placeholder="Mention here"><br><br>

    <label class="main-label">QUALIFICATION : </label>
    <table>
        <tr>
            <th>Sr.No</th>
            <th>Examination</th>
            <th>Board</th>
            <th>Percentage</th>
            <th>Year of Passing</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Class X</td>
            <td><input type="text"></td>
            <td><input type="number"></td>
            <td><input type="number"></td>
        </tr>

        <tr>
            <td>2</td>
            <td>Class XII</td>
            <td><input type="text"></td>
            <td><input type="number"></td>
            <td><input type="number"></td>
        </tr>

        <tr>
            <td>3</td>
            <td>Graduation</td>
            <td><input type="text"></td>
            <td><input type="number"></td>
            <td><input type="number"></td>
        </tr>

        <tr>
            <td>4</td>
            <td>Masters</td>
            <td><input type="text"></td>
            <td><input type="number"></td>
            <td><input type="number"></td>
        </tr>
    </table>

    <br>

    <label class="main-label">COURSES APPLIED FOR : </label>
    <input type="radio" name="APPLIED FOR"> BCA
    <input type="radio" name="APPLIED FOR"> B.Com
    <input type="radio" name="APPLIED FOR"> B.Sc
    <input type="radio" name="APPLIED FOR"> B.A

    <br><br>

    <div class="buttons">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </div>

</div>
</form>
</html>
