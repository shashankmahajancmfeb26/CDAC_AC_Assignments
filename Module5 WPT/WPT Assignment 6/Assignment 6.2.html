<!DOCTYPE html>
<html>

<head>
    <title>Personal Budget Tracker</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <h2>Personal Budget Tracker</h2>
    <div id="container">
        <input type="text" id="desc" placeholder="Description"><br><br>
        <input type="text" id="amount" placeholder="Amount"><br><br>
        <input type="date" id="date"><br><br>

        <button onclick="addExpenseUI()">Add Expense</button>
        <button onclick="showExpenses()">View Expenses</button>
        <button onclick="showTotal()">Total Expense</button>

        <pre id="output">Output</pre>
    </div>


    <script>

        var expenses = [];
        let totalExpense = 0;
        const taxRate = 0;

        function addExpense(...newExpenses) {
            expenses = [...expenses, ...newExpenses];
            showMessage(() => console.log("Expense Added Successfully"));
        }

        function showMessage(callback) {
            callback();
        }

        function displayExpenses() {
            let result = expenses.map(({ description, amount, date }, index) => {
                return `${index + 1}. ${description} - ₹${amount} - ${date}`;
            });

            document.getElementById("output").innerText = result.join("\n");
        }

        function filterExpenses() {
            let filtered = expenses.filter(e => e.amount > 20);
            console.log("Filtered (>20):", filtered);
        }

        function calculateTotal() {
            totalExpense = expenses.reduce((sum, e) => sum + e.amount, 0);
            return totalExpense;
        }

        function createTotalTracker() {
            let total = 0;
            return function (amount) {
                total += amount;
                return total;
            }
        }
        let updateTotal = createTotalTracker();

        function addExpenseUI() {
            let description = document.getElementById("desc").value;
            let amount = Number(document.getElementById("amount").value);
            let date = document.getElementById("date").value;

            let expense = { description, amount, date };

            addExpense(expense);

            updateTotal(amount);

            alert("Expense Added");
        }

        function showExpenses() {
            displayExpenses();
        }

        function showTotal() {
            let total = calculateTotal();
            document.getElementById("output").innerText = "Total: ₹" + total;
        }

        function fetchExpenses() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve([]);
                }, 1000);
            });
        }

        async function loadExpenses() {
            let data = await fetchExpenses();
            expenses = [...data]; // spread
            displayExpenses();
        }

        loadExpenses();

    </script>

</body>

</html>
