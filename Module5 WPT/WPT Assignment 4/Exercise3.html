<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Simulate</title>
</head>

<body>
    <script>
        function fetchData(url, callback) {
            console.log("Fetching from:", url);
            setTimeout(function () {
                let response = "Hello Shashank";
                callback(response);
            }, 2000);
        }
        fetchData("https://www.wikipedia.org/", function (response) {
            console.log(response);
        });
    </script>
</body>

</html>
